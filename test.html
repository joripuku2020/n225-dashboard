const fmt=n=>n==null?'—':Number(n).toLocaleString();
const sg=n=>n==null?'—':(Number(n)>0?'+':'')+Number(n).toLocaleString();
const cl=n=>n==null?'':Number(n)>0?'pos':Number(n)<0?'neg':'';
document.getElementById('meta').textContent='generated '+D.generated;
// T0 前日タイプ
(function(){
  const DT=D.daytype; if(!DT){return;}
  const tcl={'トレンド上':'pos','トレンド下':'neg','往復':'whip','凪':'calm','中間':''};
  document.getElementById('dt0head').innerHTML=`前日 <b>${DT.last.date}</b> = <b class="${tcl[DT.last.type]}">${DT.last.type}</b>`;
  document.getElementById('dt0r').innerHTML=(DT.recent||[]).slice().reverse().map(r=>`<tr><td>${r.date}</td><td class="lbl ${tcl[r.type]}" data-label="タイプ">${r.type}</td></tr>`).join('');
})();
// T1（合算/商品別の時系列 と 限月×商品マトリクスの切替）
const t1days=(D.daily.days||[]).slice().reverse();
const t1prods=[['large','ラージ'],['mini','mini'],['micro','マイクロ']];
// 日付セレクタ（マトリクス用, 新しい日付が先頭）
const t1sel=document.getElementById('t1date');
t1sel.innerHTML=t1days.map(d=>`<option value="${d.date}">${d.date}</option>`).join('');
t1sel.addEventListener('change',()=>t1matrix(t1sel.value));
function t1matrix(date){
  const d=t1days.find(x=>x.date===date)||t1days[0];
  const head=document.getElementById('t1head'),body=document.getElementById('t1');
  if(!d){head.innerHTML='';body.innerHTML='';return;}
  const exps=[...new Set((d.grid||[]).map(g=>g.expiry))].sort();
  head.innerHTML='<tr><th rowspan="2">限月</th>'+t1prods.map(p=>`<th colspan="3" style="text-align:center">${p[1]}</th>`).join('')+'</tr><tr>'+t1prods.map(()=>'<th>出来高</th><th>建玉前日比</th><th>新規率%</th>').join('')+'</tr>';
  body.innerHTML=exps.map(e=>{
    const cells=t1prods.map(p=>{const c=(d.grid||[]).find(g=>g.expiry===e&&g.s===p[0]);if(!c)return `<td class="mz" data-label="${p[1]} 出来高">—</td><td class="mz" data-label="${p[1]} 建玉前日比">—</td><td class="mz" data-label="${p[1]} 新規率%">—</td>`;return `<td data-label="${p[1]} 出来高">${fmt(c.vol)}</td><td data-label="${p[1]} 建玉前日比" class="${cl(c.chg)}">${sg(c.chg)}</td><td data-label="${p[1]} 新規率%" class="${cl(c.ratio)}">${sg(c.ratio)}</td>`;}).join('');
    return `<tr><td class="lbl">${e}</td>${cells}</tr>`;
  }).join('');
}
function t1render(v){
  const head=document.getElementById('t1head'),body=document.getElementById('t1'),dw=document.getElementById('t1datewrap');
  if(v==='matrix'){ dw.style.display='block'; t1matrix(t1sel.value); return; }
  dw.style.display='none';
  const lastCol=(v==='total')?'':'<th>主な限月</th>';
  head.innerHTML='<tr><th>日付</th><th>終値</th><th>前日比%</th><th>売買高</th><th>建玉前日比</th><th>新規率%</th>'+lastCol+'</tr>';
  body.innerHTML=t1days.map(d=>{
    const o=(v==='total')?d.total:((d.products||[]).find(p=>p.s===v)||{vol:null,chg:null,ratio:null,dom:'—',domChg:null});
    const last=(v==='total')?'':`<td class="lbl" data-label="主な限月" style="font-size:11px;color:var(--mut)">${o.dom||'—'} (${sg(o.domChg)})</td>`;
    return `<tr><td>${d.date}</td><td data-label="終値">${fmt(d.close)}</td><td data-label="前日比%" class="${cl(d.dayRet)}">${sg(d.dayRet)}</td><td data-label="売買高">${fmt(o.vol)}</td><td data-label="建玉前日比" class="${cl(o.chg)}">${sg(o.chg)}</td><td data-label="新規率%" class="${cl(o.ratio)}">${sg(o.ratio)}</td>${last}</tr>`;
  }).join('');
}
document.querySelectorAll('#t1tabs .tb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('#t1tabs .tb').forEach(x=>x.classList.remove('active'));b.classList.add('active');t1render(b.dataset.v);}));
t1render('total');
// T2 summary
document.getElementById('t2s').innerHTML=(D.weekly.quads||[]).map(q=>`<tr class="${q.name==='下落週に買い増し'?'hl':''}"><td class="lbl">${q.name}</td><td data-label="週数">${fmt(q.n)}</td><td data-label="1週勝率%">${fmt(q.win1)}</td><td data-label="4週勝率%">${fmt(q.win4)}</td><td data-label="平均1週%" class="${cl(q.avg1)}">${sg(q.avg1)}</td><td data-label="平均2週%" class="${cl(q.avg2)}">${sg(q.avg2)}</td><td data-label="平均4週%" class="${cl(q.avg4)}">${sg(q.avg4)}</td></tr>`).join('');
// T2 all rows
document.getElementById('t2').innerHTML=(D.weekly.rows||[]).slice().reverse().map(r=>`<tr class="${r.quad==='下落週に買い増し'?'hl':''}"><td>${r.d}</td><td data-label="終値">${fmt(r.close)}</td><td data-label="週足%" class="${cl(r.wret)}">${sg(r.wret)}</td><td data-label="個人ネット" class="${cl(r.net)}">${sg(r.net)}</td><td data-label="前週比" class="${cl(r.dnet)}">${sg(r.dnet)}</td><td class="lbl" data-label="象限">${r.quad}</td><td data-label="先1週%" class="${cl(r.f1)}">${sg(r.f1)}</td><td data-label="先2週%" class="${cl(r.f2)}">${sg(r.f2)}</td><td data-label="先4週%" class="${cl(r.f4)}">${sg(r.f4)}</td></tr>`).join('');
// T3
document.getElementById('t3').innerHTML=(D.mm.rows||[]).map(r=>`<tr><td class="lbl">${r.name}</td><td data-label="MM度"><b>${fmt(r.score)}</b></td><td data-label="符号反転率%">${fmt(r.flip)}</td><td data-label="方向持続率%">${fmt(r.persist)}</td><td data-label="OP両建て度%">${fmt(r.twoSide)}</td><td data-label="週次|ネット|平均">${fmt(r.avgAbs)}</td><td data-label="売買高/日">${fmt(r.volDay)}</td><td data-label="出現週数">${fmt(r.weeks)}</td></tr>`).join('');
</script></body></html>
