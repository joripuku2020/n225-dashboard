<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>N225 需給データ</title><style>
:root{--bg:#0e1117;--card:#161b22;--bd:#30363d;--fg:#e6edf3;--mut:#8b949e;--up:#3fb950;--dn:#f85149;--ac:#58a6ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;font-size:13px}header{position:sticky;top:0;z-index:4;background:#0e1117ee;border-bottom:1px solid var(--bd)}.head{max-width:1100px;margin:auto;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}h1{font-size:18px;margin:0}.nav{display:flex;gap:5px}.nav a{border:1px solid var(--bd);border-radius:7px;padding:5px 8px;color:var(--mut);text-decoration:none;font-size:11px}.nav a.active{color:#fff;border-color:var(--ac);background:#172234}main{max-width:1100px;margin:auto;padding:14px}.meta,.note{color:var(--mut);font-size:11px;line-height:1.6}.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px;margin:12px 0}h2{font-size:16px;color:var(--ac);margin:0 0 10px}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.kpi{border:1px solid var(--bd);border-radius:8px;padding:9px}.kpi .l{font-size:10px;color:var(--mut)}.kpi .v{font-size:18px;font-weight:700;margin-top:3px}.pos{color:var(--up)}.neg{color:var(--dn)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{padding:7px 6px;border-bottom:1px solid var(--bd);text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}.contract{margin-top:18px}.contract h3{font-size:14px;margin:0}.scroll{overflow-x:auto}@media(max-width:680px){.head{align-items:flex-start;flex-direction:column}.nav{width:100%;flex-wrap:wrap}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}main{padding:10px}.card{padding:11px}}
</style></head><body><header><div class="head"><h1>日経225 需給データ</h1><nav class="nav"><a href="./index.html">概要</a><a href="./options.html">OP</a><a href="./futures.html">先物</a><a class="active" href="./context.html">需給</a><a href="./test.html">材料</a><a href="./chart_intraday.html">分足</a></nav></div></header><main><div class="meta" id="meta"></div>
<section class="card"><h2>裁定取引に係る現物ポジション</h2><div class="kpis" id="arbKpi"></div><div class="scroll"><table><thead><tr><th>日付</th><th>買い残（千株）</th><th>前回差</th><th>売り残（千株）</th><th>前回差</th></tr></thead><tbody id="arbRows"></tbody></table></div></section>
<section class="card"><h2>2市場・信用評価損益率（週次実測＋日次補間）</h2><div id="marginPnl"></div></section>

</main><script>const D={"generated":"2026-07-17 18:22","arb":[{"date":"2026-07-09","buy":643503,"sell":10182,"buyChg":-25304,"sellChg":-1922},{"date":"2026-07-10","buy":659035,"sell":11860,"buyChg":15532,"sellChg":1678},{"date":"2026-07-13","buy":653938,"sell":10994,"buyChg":-5097,"sellChg":-866},{"date":"2026-07-14","buy":659000,"sell":10712,"buyChg":5062,"sellChg":-282},{"date":"2026-07-15","buy":665682,"sell":13861,"buyChg":6682,"sellChg":3149}],"marginPnl":{"weekDate":"2026-07-10","weekly":-4.95,"weeklyDelta":-2.1700000000000004,"estimate":-11.07,"estimateDate":"2026-07-17","indexRet":-6.44,"pct":81,"n":100,"buyValue":67322,"sellValue":7955,"ratio":8.46,"checks":77,"mismatches":2,"mismatchDetails":"2025-04-18 -11.53% vs 3.31% / 2025-08-15 -5.48% vs -5.46%"}},fmt=n=>n==null?'—':Number(n).toLocaleString(),sg=n=>n==null?'—':(Number(n)>0?'+':'')+fmt(n),cl=n=>Number(n)>0?'pos':Number(n)<0?'neg':'',k=(l,v,c='')=>`<div class="kpi"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`;document.getElementById('meta').textContent='generated '+D.generated;
const A=D.arb||[],a=A[A.length-1],ap=A[A.length-2];if(a){const bc=a.buyChg??(ap?a.buy-ap.buy:null),sc=a.sellChg??(ap?a.sell-ap.sell:null);document.getElementById('arbKpi').innerHTML=k('公表日',a.date)+k('買い残',fmt(a.buy)+'千株')+k('前回差',sg(bc),cl(bc))+k('売り残',fmt(a.sell)+'千株');document.getElementById('arbRows').innerHTML=A.slice().reverse().map((r,i,rev)=>{const p=rev[i+1],bd=r.buyChg??(p?r.buy-p.buy:null),sd=r.sellChg??(p?r.sell-p.sell:null);return `<tr><td>${r.date}</td><td>${fmt(r.buy)}</td><td class="${cl(bd)}">${sg(bd)}</td><td>${fmt(r.sell)}</td><td class="${cl(sd)}">${sg(sd)}</td></tr>`}).join('')}else{document.getElementById('arbKpi').innerHTML='<div class="note">データ未取得</div>'}
const M=D.marginPnl;if(M){document.getElementById('marginPnl').innerHTML=`<div class="kpis">${k('週次実測 '+M.weekDate,M.weekly.toFixed(2)+'%',cl(M.weekly))}${k('前週比',sg(Number(M.weeklyDelta).toFixed(2))+'pt',cl(M.weeklyDelta))}${k('推定当日 '+M.estimateDate,M.estimate==null?'—':M.estimate.toFixed(2)+'%',cl(M.estimate))}${k('保有100週内',M.pct+'百分位')}</div><div class="note">信用買い残 ${fmt(M.buyValue)}億円 ／ 売り残 ${fmt(M.sellValue)}億円 ／ 信用倍率 ${M.ratio.toFixed(2)}倍。補間期間の日経225 ${sg(M.indexRet)}%。照合 ${fmt(M.checks)}週中、不一致 ${fmt(M.mismatches)}週${M.mismatchDetails?'（'+M.mismatchDetails+'）':''}。</div>`}else{document.getElementById('marginPnl').innerHTML='<div class="note">週次実測値を取得できていません。偽の0は表示しません。</div>'}
</script></body></html>
