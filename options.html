*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
header{position:sticky;top:0;z-index:20;background:rgba(14,17,23,.96);border-bottom:1px solid var(--bd);padding:11px 14px}
.head{max-width:980px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.head h1{font-size:17px;margin:0}.nav{display:flex;gap:6px;flex-wrap:wrap}
.nav a,.tab{border:1px solid var(--bd);border-radius:7px;padding:6px 9px;color:var(--mut);text-decoration:none;font-size:11px;background:#11161d;cursor:pointer}.nav a.active,.tab.active{color:#fff;border-color:var(--ac);background:#172234}
main{max-width:980px;margin:auto;padding:12px}.meta,.note{font-size:11px;color:var(--mut);line-height:1.55}.note{margin:8px 0;padding:8px 9px;background:#11161d;border-radius:7px}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}.panel{border-bottom:1px solid #21262d;padding:8px 0 16px;margin-bottom:8px}.panel h2{font-size:14px;color:var(--ac);margin:4px 0}
.hidden{display:none!important}.ladder{display:grid;gap:2px}.ladder-head,.ladder-row{display:grid;grid-template-columns:minmax(0,1fr) 88px minmax(0,1fr);gap:5px;align-items:stretch}
.ladder-head{position:sticky;top:50px;z-index:10;background:var(--bg);padding:6px 0;color:var(--mut);font-size:10px;border-bottom:1px solid var(--bd)}.ladder-head div{text-align:center}
.ladder-row{min-height:31px;content-visibility:auto;contain-intrinsic-size:31px}.strike{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:750;background:#11161d;border-radius:4px}
.side{background:#11161d;border-radius:5px;padding:3px;min-height:29px;display:grid;gap:2px;position:relative;overflow:hidden}.side.empty{display:flex;align-items:center;color:#57606a;font-size:9px}.side.put.empty{justify-content:flex-end}
.entry{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:4px;align-items:center;padding:3px 5px;border-radius:4px;background:#161b22;font-size:10px;overflow:hidden}.entry .bar{position:absolute;top:0;bottom:0;opacity:.16}.put .bar{right:0;background:var(--dn)}.call .bar{left:0;background:var(--up)}
.entry span,.entry b{position:relative;z-index:1}.entry .who{min-width:0;overflow-wrap:anywhere}.entry b{white-space:nowrap}.buy{color:var(--up)}.sell{color:var(--dn)}.delta{color:var(--mut);font-weight:500}.new{color:#d2a8ff}
.attr{display:inline-block;font-size:9px;border:1px solid var(--bd);border-radius:999px;padding:1px 4px;margin-right:3px}.attr.海外{color:var(--ov);border-color:#24547a}.attr.国内{color:var(--dom);border-color:#553b69}.attr.個人{color:var(--ret);border-color:#6e5400}
.list{display:grid;gap:6px}.group-title{font-size:12px;font-weight:750;padding:7px 8px;background:#1b2027;border-radius:5px;margin-top:5px}.company{display:grid;grid-template-columns:minmax(130px,1fr) 105px 105px;gap:7px;align-items:center;padding:7px 9px;background:#11161d;border-left:3px solid var(--bd);border-radius:5px;font-size:11px}.company.海外{border-left-color:var(--ov)}.company.国内{border-left-color:var(--dom)}.company.個人{border-left-color:var(--ret)}
.company .num{text-align:right;font-weight:750}.company .sub{text-align:right;color:var(--mut)}.zero{color:#6e7681}
.frow{display:grid;grid-template-columns:110px 130px minmax(0,1fr);gap:7px;align-items:center;padding:7px 9px;background:#11161d;border-radius:5px;font-size:11px}
.fmon{font-weight:750}.fbar{position:relative;height:18px;background:#161b22;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.fbar i{position:absolute;left:0;top:0;bottom:0}.fbar b{position:relative;z-index:1;font-size:10px}.fnum{color:var(--mut)}
@media(max-width:600px){main{padding:8px}.head{align-items:flex-start;flex-direction:column}.ladder-head,.ladder-row{grid-template-columns:minmax(0,1fr) 70px minmax(0,1fr);gap:3px}.entry{grid-template-columns:1fr;padding:3px;font-size:9px}.entry b{text-align:right}.company{grid-template-columns:minmax(100px,1fr) 75px 75px;padding:6px;font-size:10px}.attr{display:none}.frow{grid-template-columns:90px 100px minmax(0,1fr);gap:4px;padding:6px;font-size:10px}}</style></head><body>

function drawOse(){const raw=D.ose.filter(x=>x.expiry===oe),rows=range(raw).map(k=>raw.find(x=>x.strike===k)||{strike:k,pVol:0,cVol:0,pOi:0,cOi:0,pChg:0,cChg:0});
if(om==='ratio'){document.getElementById('oseLadder').innerHTML=shell('Put 新規率','行使価格','Call 新規率')+rows.slice().sort((a,b)=>b.strike-a.strike).map(x=>{const cell=(vol,chg,cl)=>{if(!vol&&!chg)return `<div class="side ${cl} empty">—</div>`;if(!vol)return `<div class="side ${cl}"><div class="entry"><b>出来高0で${sg(chg)}枚</b> <small class="delta">（移管等）</small></div></div>`;const pct=Math.round(chg/vol*100),bg=pct>=0?'rgba(210,168,255,.5)':'rgba(240,136,62,.55)';return `<div class="side ${cl}"><div class="entry"><i class="bar" style="width:${Math.min(100,Math.abs(pct))}%;background:${bg}"></i><b>${(pct>0?'+':'')+pct}%</b> <small class="delta">（${sg(chg)}／出来高${fmt(vol)}枚）</small></div></div>`};return `<div class="ladder-row">${cell(x.pVol,x.pChg,'put')}<div class="strike">${fmt(x.strike)}</div>${cell(x.cVol,x.cChg,'call')}</div>`}).join('');return;}
const f=om==='vol'?['pVol','cVol']:om==='oi'?['pOi','cOi']:['pChg','cChg'],title=om==='vol'?'出来高':om==='oi'?'建玉':'前日比',mx=Math.max(1,...rows.flatMap(x=>[Math.abs(x[f[0]]),Math.abs(x[f[1]])]));document.getElementById('oseLadder').innerHTML=shell('Put '+title,'行使価格','Call '+title)+rows.slice().sort((a,b)=>b.strike-a.strike).map(x=>{const cell=(v,cl)=>`<div class="side ${cl}"><div class="entry"><i class="bar" style="width:${Math.abs(v)/mx*100}%"></i><b class="${om==='chg'?(v>0?'buy':v<0?'sell':'zero'):''}">${om==='chg'?sg(v):fmt(v)}枚</b></div></div>`;return `<div class="ladder-row">${cell(x[f[0]],'put')}<div class="strike">${fmt(x.strike)}</div>${cell(x[f[1]],'call')}</div>`}).join('')}
buttons('oseExp',uniq(D.ose.map(x=>x.expiry)).map(x=>[x,x+'限']),oe,v=>{oe=v;drawOse()});document.querySelectorAll('#oseMode button').forEach(b=>b.onclick=()=>{om=b.dataset.mode;document.querySelectorAll('#oseMode button').forEach(x=>x.classList.toggle('active',x===b));drawOse()});drawOse();
let we=uniq(D.weekly.map(x=>x.expiry))[0]||'';
function drawWeek(){const rows=D.weekly.filter(x=>x.expiry===we),xs=range(rows),mx=Math.max(1,...rows.map(x=>Math.abs(x.net)));document.getElementById('weekLadder').innerHTML=shell('Put 純ネット','行使価格','Call 純ネット')+xs.slice().reverse().map(k=>{const p=rows.filter(x=>x.strike===k&&x.type==='P'),c=rows.filter(x=>x.strike===k&&x.type==='C');const cell=(a,cl)=>`<div class="side ${cl} ${a.length?'':'empty'}">${a.length?a.sort((x,y)=>Math.abs(y.net)-Math.abs(x.net)).map(x=>ent(x,mx,true)).join(''):'0'}</div>`;return `<div class="ladder-row">${cell(p,'put')}<div class="strike">${fmt(k)}</div>${cell(c,'call')}</div>`}).join('')}
buttons('weekExp',uniq(D.weekly.map(x=>x.expiry)).map(x=>[x,x+'限']),we,v=>{we=v;drawWeek()});drawWeek();
</script></body></html>
