    const poc=keys.reduce((a,b)=>acc[a]>=acc[b]?a:b,keys[0]);
    ctx.strokeStyle='#f0f6fc'; ctx.setLineDash([4,3]); ctx.beginPath();
    ctx.moveTo(padL,y(poc*bucket+bucket/2)); ctx.lineTo(W-2,y(poc*bucket+bucket/2)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#f0f6fc'; ctx.textAlign='left'; ctx.fillText('POC '+(poc*bucket).toLocaleString(), W-padR+4, y(poc*bucket+bucket/2)-4);
  }
  // 終値ライン(5分のみ): 白点線=日中終値 / 青点線=夜間終値
  if(tf==='5M'){
    if(single){
      // 前営業日の日中終値 → 左端から右端まで
      const ds=D.tf5; let prevClose=null;
      for(let j=curDay-1;j>=0;j--){ const bb=ds[j].bars.filter(b=>b.s==='d'); if(bb.length){ prevClose=bb[bb.length-1].c; break; } }
      if(prevClose!==null && prevClose>=lo && prevClose<=hi){
        ctx.strokeStyle='#d29922'; ctx.setLineDash([6,4]); ctx.beginPath();
        ctx.moveTo(padL,y(prevClose)); ctx.lineTo(W-padR,y(prevClose)); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle='#d29922'; ctx.textAlign='left'; ctx.font='10px sans-serif';
        ctx.fillText('前日日中終 '+prevClose.toLocaleString(), padL+4, y(prevClose)-3);
      }
      // 当日夜間の終値 → 夜間が終わった位置から右端まで
      let ni=-1; for(let i2=0;i2<n;i2++){ if(bars[i2].s==='n') ni=i2; }
      if(ni>=0){
        const nc=bars[ni].c;
        if(nc>=lo && nc<=hi){
          ctx.strokeStyle='#58a6ff'; ctx.setLineDash([6,4]); ctx.beginPath();
          ctx.moveTo(x(ni)+bw,y(nc)); ctx.lineTo(W-padR,y(nc)); ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle='#58a6ff'; ctx.font='10px sans-serif';
          ctx.fillText('夜間終 '+nc.toLocaleString(), Math.min(x(ni)+bw+4, W-padR-90), y(nc)-3);
        }
      }
    } else if(range==='all'){
      // 各セッションの終値を「次の同種セッションの終値」まで延長(日中は日中で、夜間は夜間で切れる)
      const ends={d:[],n:[]};
      for(let i2=0;i2<n;i2++){
        const s=bars[i2].s;
        if(i2===n-1 || bars[i2+1].s!==s){ ends[s].push({i:i2,p:bars[i2].c}); }
      }
      const colors={d:'#d29922',n:'#58a6ff'};
      for(const s of ['d','n']){
        const L=ends[s];
        ctx.strokeStyle=colors[s]; ctx.setLineDash([4,4]);
        for(let k2=0;k2<L.length;k2++){
          const iEnd=(k2+1<L.length)?L[k2+1].i:n-1;
          const p=L[k2].p; if(p<lo||p>hi) continue;
          ctx.beginPath(); ctx.moveTo(x(L[k2].i)+bw,y(p)); ctx.lineTo(x(iEnd)+bw,y(p)); ctx.stroke();
        }
        ctx.setLineDash([]);
      }
    }
  }
  // 区切り線: 日別=夜間/日中境界、全期間=営業日境界
  ctx.textAlign='left';
  if(single){
    let dayStart=-1;
    for(let i=0;i<n;i++){ if(bars[i].s==='d'){ dayStart=i; break; } }
    if(dayStart>0){
      ctx.strokeStyle='#3a4351'; ctx.setLineDash([2,4]); ctx.beginPath();
      ctx.moveTo(x(dayStart)-1,padT); ctx.lineTo(x(dayStart)-1,H-34); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='#8b949e'; ctx.fillText('←夜間 | 日中→', x(dayStart)-40, padT+10);
    }
  } else {
    ctx.fillStyle='#8b949e';
    for(const m of marks){
      ctx.strokeStyle='#1c2430'; ctx.beginPath(); ctx.moveTo(x(m.i),padT); ctx.lineTo(x(m.i),H-34); ctx.stroke();
      ctx.fillText(m.label, x(m.i)+2, H-20);
    }
  }
  // 下段: 出来高
  let vmax=1; for(const b of bars){ if((b.v||0)>vmax)vmax=b.v; }
  for(let i=0;i<n;i++){
    const b=bars[i], h2=(b.v||0)/vmax*volH;
    ctx.fillStyle=b.c>=b.o?'#1d4428':'#4c1f1f';
    ctx.fillRect(x(i),H-34-h2,bw,h2);
  }
  // ローソク
  for(let i=0;i<n;i++){
    const b=bars[i], up=b.c>=b.o;
    ctx.strokeStyle=ctx.fillStyle=up?'#3fb950':'#f85149';
    const cx=x(i)+bw/2;
    ctx.beginPath(); ctx.moveTo(cx,y(b.h)); ctx.lineTo(cx,y(b.l)); ctx.stroke();
    const y0=y(Math.max(b.o,b.c)), y1=y(Math.min(b.o,b.c));
    ctx.fillRect(x(i),y0,bw,Math.max(1,y1-y0));
  }
  // 時刻ラベル(日別のみ)
  if(single){
    ctx.fillStyle='#8b949e'; ctx.textAlign='center';
    const times=['17:00','19:00','21:00','23:00','01:00','03:00','05:00','09:00','11:00','13:00','15:00'];
    for(let i=0;i<n;i++){
      if(times.includes(bars[i].t)){
        ctx.fillText(bars[i].t,x(i)+bw/2,H-20);
        ctx.strokeStyle='#1c2128'; ctx.beginPath(); ctx.moveTo(x(i)+bw/2,padT); ctx.lineTo(x(i)+bw/2,H-34); ctx.stroke();
      }
    }
  }
  // タイトル
  const first=bars[0], last=bars[n-1];
  ctx.textAlign='left'; ctx.fillStyle='#e6edf3'; ctx.font='12px sans-serif';
  const ttl = single
    ? date+'（夜間→日中）  始 '+first.o.toLocaleString()+' → 終 '+last.c.toLocaleString()+' ('+(last.c>=first.o?'+':'')+(last.c-first.o).toLocaleString()+'円)'
    : (tf==='D'?'日足 全期間':'全期間つなげ表示')+'  '+first.o.toLocaleString()+' → '+last.c.toLocaleString();
  ctx.fillText(ttl, padL+4, 12);
  $('legend').innerHTML='取引日の区切りはJPX方式: <b>前夜の夜間(17:00〜翌6:00)→当日日中(8:45〜15:15)</b>で1営業日(金曜夜間は月曜のタブ)。右の横棒=価格帯出来高(5円刻み、バーの高安に均等配分'+(scope==='all'?'・全期間':'・表示中の足')+')。白点線=POC(最厚帯)。5分のみ: <b>オレンジ点線=日中終値</b>(日別では前営業日の終値を全幅に)、<b>青点線=夜間終値</b>(日別では夜間の終わりから右へ)。全期間では各終値を次の同種セッションの終値まで延長。60分/日足は閑散期(最大商い日の2%未満)を自動で切り落とし。全期間はローソク幅そのままで横スクロール。データは楽天RSSの手動保存分(週1)なので最新はRSS保存日まで。';
}
buildDayTabs(); draw();
window.addEventListener('resize',()=>draw());
</script></body></html>
