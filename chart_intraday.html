let tf='5M', range='day', curDay=D.tf5.length-1, bucket=5, scope='view';

 +'  |  5分: '+(D.tf5.length?D.tf5[0].date+'〜'+D.tf5[D.tf5.length-1].date+' ('+D.tf5.length+'営業日)':'なし')

function daysOf(){ return tf==='5M'?D.tf5:D.tf60; }
function buildDayTabs(){
  const el=$('dayTabs');
  if(tf!=='5M'){ el.innerHTML=''; return; }
  const ds=daysOf();
  if(curDay>=ds.length) curDay=ds.length-1;
  let h='<span class="cap">期間</span>';
  h+=ds.map((d,i)=>`<button class="tb dy${(range==='day'&&i===curDay)?' active':''}" data-i="${i}">${d.date.slice(5)}</button>`).join('');
  h+=`<button class="tb dy${range==='all'?' active':''}" data-i="all">全期間つなげる</button>`;
  el.innerHTML=h;
  el.querySelectorAll('.dy').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.i==='all'){ range='all'; } else { range='day'; curDay=+b.dataset.i; }
    buildDayTabs(); draw();
  }));
}
document.querySelectorAll('[data-tf]').forEach(b=>b.addEventListener('click',()=>{
  tf=b.dataset.tf;
  document.querySelectorAll('[data-tf]').forEach(x=>x.classList.remove('active')); b.classList.add('active');

function viewBars(){
  if(tf==='D') return {bars:D.tfD.map(b=>({t:b.d,s:'d',o:b.o,h:b.h,l:b.l,c:b.c,v:b.v})), marks:dailyMarks(), single:false};
  const ds=daysOf();
  if(range==='day'){ const d=ds[curDay]; return {bars:d.bars, marks:[], single:true, date:d.date}; }
  const bars=[], marks=[];
  for(const d of ds){ marks.push({i:bars.length,label:d.date.slice(5)}); for(const b of d.bars) bars.push(b); }
  return {bars,marks,single:false};
}
function dailyMarks(){
  const n=D.tfD.length, step=Math.max(1,Math.ceil(n/14)), m=[];
  for(let i=0;i<n;i+=step) m.push({i,label:D.tfD[i].d.slice(2,7)});
  return m;
}
function allBarsOfTf(){
  if(tf==='D') return D.tfD;
  const out=[]; for(const d of daysOf()) for(const b of d.bars) out.push(b);
  return out;

function profile(bars,bk){
  const acc={};
  for(const b of bars){
    const b0=Math.floor(b.l/bk), b1=Math.max(b0,Math.floor(b.h/bk));
    const share=(b.v||0)/(b1-b0+1);
    for(let k=b0;k<=b1;k++){ acc[k]=(acc[k]||0)+share; }
  }
  return acc;
}
function niceStep(raw){
  const c=[5,10,25,50,100,250,500,1000,2500,5000,10000];
  for(const s of c){ if(raw<=s) return s; }

function draw(){

  if(tf==='5M'){
