      if(times.includes(bars[i].t)){
        ctx.fillText(bars[i].t,x(i)+bw/2,H-20);
        ctx.strokeStyle='#1c2128'; ctx.beginPath(); ctx.moveTo(x(i)+bw/2,padT); ctx.lineTo(x(i)+bw/2,H-34); ctx.stroke();
      }
    }
  }
  // タイトル
  const first=bars[0], last=bars[n-1];
  ctx.textAlign='left'; ctx.fillStyle='#e6edf3'; ctx.font='12px sans-serif';
  const ttl = single
    ? date+'（夜間→日中）  始 '+first.o.toLocaleString()+' → 終 '+last.c.toLocaleString()+' ('+(last.c>=first.o?'+':'')+(last.c-first.o).toLocaleString()+'円)'
    : (tf==='D'?'日足 全期間':'全期間つなげ表示')+'  '+first.o.toLocaleString()+' → '+last.c.toLocaleString();
  ctx.fillText(ttl, padL+4, 12);
  $('legend').innerHTML='取引日の区切りはJPX方式: <b>前夜の夜間(17:00〜翌6:00)→当日日中(8:45〜15:15)</b>で1営業日(金曜夜間は月曜のタブ)。右の横棒=価格帯出来高(5円刻み、バーの高安に均等配分'+(scope==='all'?'・全期間':'・表示中の足')+')。白点線=POC(最厚帯)。5分のみ: <b>オレンジ点線=日中終値</b>(日別では前営業日の終値を全幅に)、<b>青点線=夜間終値</b>(日別では夜間の終わりから右へ)。全期間では各終値を次の同種セッションの終値まで延長。60分/日足は閑散期(最大商い日の2%未満)を自動で切り落とし。全期間はローソク幅そのままで横スクロール。データは楽天RSSの手動保存分(週1)なので最新はRSS保存日まで。<b>バンド</b>(日足・60分全期間): 紫=中心線(終値の25本平均、60分は110本)、水色=通常範囲(中心からの乖離%の直近125本分布のP10〜P90=過去の8割が収まった帯)、オレンジ点線=最大範囲(同P2〜P98=96%が収まった帯)。右の点線+数字=最新の各水準。水準の物差しでありサポレジではない。';
}
buildDayTabs(); draw();
window.addEventListener('resize',()=>{ if(expanded) $('cv').height=expHeight(); draw(); });
</script></body></html>
