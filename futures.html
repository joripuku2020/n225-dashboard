header{position:sticky;top:0;z-index:20;background:rgba(14,17,23,.96);border-bottom:1px solid var(--bd);padding:11px 14px}
.head{max-width:980px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}.head h1{font-size:17px;margin:0}.nav{display:flex;gap:6px;flex-wrap:wrap}

main{max-width:980px;margin:auto;padding:12px}.meta,.note{font-size:11px;color:var(--mut);line-height:1.55}.note{margin:8px 0;padding:8px 9px;background:#11161d;border-radius:7px}

.hidden{display:none!important}.ladder{display:grid;gap:2px}.ladder-head,.ladder-row{display:grid;grid-template-columns:minmax(0,1fr) 88px minmax(0,1fr);gap:5px;align-items:stretch}
.ladder-head{position:sticky;top:50px;z-index:10;background:var(--bg);padding:6px 0;color:var(--mut);font-size:10px;border-bottom:1px solid var(--bd)}.ladder-head div{text-align:center}
.ladder-row{min-height:31px;content-visibility:auto;contain-intrinsic-size:31px}.strike{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:750;background:#11161d;border-radius:4px}
.side{background:#11161d;border-radius:5px;padding:3px;min-height:29px;display:grid;gap:2px;position:relative;overflow:hidden}.side.empty{display:flex;align-items:center;color:#57606a;font-size:9px}.side.put.empty{justify-content:flex-end}
.entry{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:4px;align-items:center;padding:3px 5px;border-radius:4px;background:#161b22;font-size:10px;overflow:hidden}.entry .bar{position:absolute;top:0;bottom:0;opacity:.16}.put .bar{right:0;background:var(--dn)}.call .bar{left:0;background:var(--up)}
.entry span,.entry b{position:relative;z-index:1}.entry .who{min-width:0;overflow-wrap:anywhere}.entry b{white-space:nowrap}.buy{color:var(--up)}.sell{color:var(--dn)}.delta{color:var(--mut);font-weight:500}.new{color:#d2a8ff}
.attr{display:inline-block;font-size:9px;border:1px solid var(--bd);border-radius:999px;padding:1px 4px;margin-right:3px}.attr.海外{color:var(--ov);border-color:#24547a}.attr.国内{color:var(--dom);border-color:#553b69}.attr.個人{color:var(--ret);border-color:#6e5400}
.list{display:grid;gap:6px}.group-title{font-size:12px;font-weight:750;padding:7px 8px;background:#1b2027;border-radius:5px;margin-top:5px}.company{display:grid;grid-template-columns:minmax(130px,1fr) 105px 105px;gap:7px;align-items:center;padding:7px 9px;background:#11161d;border-left:3px solid var(--bd);border-radius:5px;font-size:11px}.company.海外{border-left-color:var(--ov)}.company.国内{border-left-color:var(--dom)}.company.個人{border-left-color:var(--ret)}
.company .num{text-align:right;font-weight:750}.company .sub{text-align:right;color:var(--mut)}.zero{color:#6e7681}
.frow{display:grid;grid-template-columns:110px 130px minmax(0,1fr);gap:7px;align-items:center;padding:7px 9px;background:#11161d;border-radius:5px;font-size:11px}
.fmon{font-weight:750}.fbar{position:relative;height:18px;background:#161b22;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.fbar i{position:absolute;left:0;top:0;bottom:0}.fbar b{position:relative;z-index:1;font-size:10px}.fnum{color:var(--mut)}
